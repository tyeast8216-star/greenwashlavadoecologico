  <!-- Sección de Contacto (Clases únicas y aisladas) -->
  <section class="seccion-contacto-gw">
    <!-- Título principal -->
    <div class="contacto-titulo-principal">
      <h2>¡Estamos aquí para ayudarle! Contacte con nosotros y resolveremos todas sus dudas.</h2>
    </div>

    <div class="contacto-contenido-grid">
      <!-- Columna Izquierda: Información y Mascota -->
      <div class="contacto-info-columna">
        <div class="contacto-item">
          <span class="contacto-icono">📞</span>
          <div>
            <strong>Telefono</strong>
            <p>920 094 338</p>
          </div>
        </div>

        <div class="contacto-item">
          <svg style="margin-right: 5px;" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"
                  aria-hidden="true">
                  <path
                    d="M20.52 3.48C18.3 1.26 15.35 0 12.11 0 5.63 0 .45 5.18.45 11.66c0 2.05.54 4.05 1.57 5.78L0 24l6.12-1.63c1.65.9 3.52 1.35 5.39 1.35 6.48 0 11.66-5.18 11.66-11.66 0-3.24-1.26-6.19-3.49-8.53Z"
                    fill="#25d366" />
                  <path
                    d="M17.65 14.12c-.32-.16-1.92-.95-2.22-1.06-.3-.11-.52-.16-.74.16-.22.32-.86 1.06-1.06 1.28-.19.22-.38.25-.71.08-.33-.16-1.39-.51-2.65-1.64-.98-.88-1.63-1.96-1.82-2.29-.19-.33-.02-.51.14-.67.14-.14.33-.36.49-.54.16-.19.21-.33.33-.55.11-.22.06-.41-.03-.57-.09-.16-.74-1.78-1.01-2.44-.27-.64-.55-.55-.74-.56h-.63c-.22 0-.57.08-.87.41-.3.33-1.16 1.13-1.16 2.75 0 1.61 1.19 3.16 1.36 3.38.16.22 2.35 3.6 5.7 5.05.8.35 1.42.56 1.9.72.8.26 1.53.22 2.1.13.64-.1 1.92-.78 2.19-1.53.27-.74.27-1.38.19-1.52-.08-.16-.3-.25-.63-.41Z"
                    fill="#fff" />
                </svg>
          <div>
            <strong>WhatsApp</strong>
            <p>+34 603 299 299</p>
          </div>
        </div>

        <div class="contacto-item">
          <span class="contacto-icono">✉️</span>
          <div>
            <strong>Email</strong>
            <p>info@greenwash.es</p>
          </div>
        </div>

        <!-- Mascota corporativa -->
        <div class="contacto-mascota">
          <img src="./images/mascotagw.png" alt="Mascota Green Wash">
        </div>
      </div>

      <!-- Columna Derecha: Formulario con tarjeta de fondo verde claro -->
      <div class="contacto-formulario-caja">
        <form class="formulario-contacto-gw">
          <div class="form-fila-doble">
            <div class="form-grupo">
              <label for="nombre-contacto">Nombre</label>
              <input type="text" id="nombre-contacto" name="nombre">
            </div>
            <div class="form-grupo">
              <label for="modalidad-contacto">Modalidad de Implantación</label>
              <select id="modalidad-contacto" name="modalidad">
                <option value="parking">Parking Subterráneo</option>
                <option value="industrial">Local Industrial</option>
                <option value="superficie">Parking Superficie</option>
                <option value="lowcost">Parking Low Cost</option>
              </select>
            </div>
          </div>

          <div class="form-fila-doble">
            <div class="form-grupo">
              <label for="email-contacto">E-mail</label>
              <input type="email" id="email-contacto" name="email">
            </div>
            <div class="form-grupo">
              <label>Zona</label>
              <div class="form-radio-grupo">
                <label><input type="radio" name="zona" value="espana" checked> España</label>
                <label><input type="radio" name="zona" value="internacional"> Internacional</label>
              </div>
            </div>
          </div>

          <div class="form-grupo">
            <label for="telefono-contacto">Telefono</label>
            <input type="tel" id="telefono-contacto" name="telefono">
          </div>

          <div class="form-grupo">
            <label for="comentarios-contacto">Comentarios (opcional)</label>
            <textarea id="comentarios-contacto" name="comentarios" rows="4"></textarea>
          </div>

          <button type="submit" class="form-boton-enviar">Enviar</button>
        </form>
      </div>
    </div>
